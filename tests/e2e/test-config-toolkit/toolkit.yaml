name: tb-config-test
version: 0.1.0
description: Synthetic toolkit with a Tier-1 config block — exercises Phase 3C-1 install/serve integration.
author: Toolbase
category: other
config:
  - name: api_key
    description: A secret API key (mocked for the test).
    type: secret
    required: true
  - name: max_workers
    description: Number of parallel workers for batch operations.
    type: integer
    default: 4
    min: 1
    max: 16
tools:
  - name: get_config
    function: tools.get_config
    description: Returns the injected state values, for the test to verify.
